services:
  web:
    image: nginx:1.27-alpine
    container_name: portfolio-web
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80" # local access without ngrok: http://localhost:8080
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:3
    container_name: portfolio-ngrok
    # Tunnel target is the compose DNS name — localhost here would be the
    # ngrok container itself (ADR-0004).
    command: ["http", "web:80"]
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    volumes:
      - ./deploy/ngrok/ngrok.yml:/etc/ngrok.yml:ro
    ports:
      - "4040:4040" # inspection UI/API: public URL at /api/tunnels
    depends_on:
      - web
    restart: unless-stopped


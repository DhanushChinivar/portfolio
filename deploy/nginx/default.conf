server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain;

    # No fingerprinted filenames (ADR-0001), so data and HTML must always revalidate.
    location ~* \.json$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Modest cache for assets — do not extend; names aren't hashed.
    location ~* \.(?:css|js|svg|png|jpg|jpeg|webp|ico|pdf)$ {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # ── Phase 2: reverse proxy to backend API ──────────────────────────
    # Keep commented until the `api` service exists in docker-compose —
    # nginx fails at startup if an upstream hostname doesn't resolve.
    # The resolver+variable form lets nginx tolerate api container restarts.
    #
    # location /api/ {
    #     resolver 127.0.0.11 valid=10s;   # Docker embedded DNS
    #     set $api_upstream http://api:3000;
    #     proxy_pass $api_upstream;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
